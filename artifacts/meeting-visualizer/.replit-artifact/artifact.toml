kind = "web"
previewPath = "/"
title = "Meeting AI Visualizer"
version = "1.0.0"
id = "artifacts/meeting-visualizer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19231

[services.development]
run = "pnpm --filter @workspace/meeting-visualizer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meeting-visualizer", "run", "build" ]
publicDir = "artifacts/meeting-visualizer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19231"
BASE_PATH = "/"
