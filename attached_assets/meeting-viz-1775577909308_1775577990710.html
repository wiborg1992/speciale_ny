<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
@keyframes ledPulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
@keyframes ledAlarm { 0%,100%{opacity:1} 50%{opacity:.25} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #F8FAFC;
  font-family: 'Outfit', sans-serif;
  color: #333;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 24px 16px;
}

.product-title {
  font-size: 2rem;
  font-weight: 700;
  color: #002A5C;
  text-align: center;
  animation: fadeUp 0.5s ease both;
  margin-bottom: 4px;
}

.product-subtitle {
  font-size: 0.88rem;
  color: #6B7280;
  font-weight: 400;
  text-align: center;
  animation: fadeUp 0.5s ease both 0.08s;
  margin-bottom: 24px;
}

.pump-container {
  display: flex;
  justify-content: center;
  align-items: center;
  animation: fadeUp 0.6s ease both 0.15s;
  position: relative;
  margin-bottom: 28px;
  width: min(90vw, 520px);
}

.pump-container svg {
  width: 100%;
  height: auto;
  display: block;
}

.info-row {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
  animation: fadeUp 0.5s ease both 0.3s;
  margin-bottom: 24px;
}

.info-box {
  background: #FFFFFF;
  border-left: 4px solid #0077C8;
  border-radius: 8px;
  padding: 14px 22px;
  box-shadow: 0 2px 8px rgba(0,42,92,0.08), 0 0 0 1px rgba(0,42,92,0.06);
  min-width: 180px;
}

.info-box .label {
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #6B7280;
  font-weight: 600;
  margin-bottom: 4px;
}

.info-box .value {
  font-size: 1.3rem;
  font-weight: 700;
  color: #002A5C;
}

.info-box .value span {
  font-size: 0.82rem;
  color: #0077C8;
  font-weight: 400;
  margin-left: 4px;
}

.footer {
  font-size: 0.62rem;
  color: #B0B8C1;
  text-align: center;
  margin-top: auto;
  padding-top: 12px;
}
</style>
