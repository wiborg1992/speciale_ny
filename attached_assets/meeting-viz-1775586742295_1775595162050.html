<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap');

@keyframes ledAlarm { 0%,100%{opacity:1} 50%{opacity:.25} }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes pulseHighlight { 0%,100%{stroke-opacity:0.8} 50%{stroke-opacity:0.4} }

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#F0F4F8;
  background-image:repeating-linear-gradient(45deg,rgba(0,42,92,0.02) 0px,rgba(0,42,92,0.02) 1px,transparent 1px,transparent 16px);
  font-family:'Outfit',sans-serif;
  color:#333;
  min-height:100vh;
  padding:24px 16px;
}

.root{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:20px}

.hero{text-align:center;animation:fadeUp .5s ease both}
.hero h1{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:#002A5C;line-height:1.15}
.hero .sub{font-size:.82rem;color:#6B7280;margin-top:4px}
.hero .badge{display:inline-block;margin-top:8px;background:#EFF6FF;border:1px solid rgba(0,119,200,.2);color:#0077C8;font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:4px 14px;border-radius:999px}

.main-layout{display:flex;gap:0;min-height:620px;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,42,92,.1);animation:fadeUp .6s ease both;animation-delay:.1s}

.flow-area{flex:1;min-width:0;background:#fff;padding:24px 20px;overflow-y:auto;position:relative}
.flow-area h2{font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;color:#002A5C;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.flow-area h2 .phase-dot{width:8px;height:8px;border-radius:50%;background:#0077C8}

.detail-panel{width:340px;min-width:340px;background:#F8FAFC;border-left:2px solid #E2E8F0;padding:20px;overflow-y:auto;display:flex;flex-direction:column}
.detail-header{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6B7280;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.detail-placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:.88rem;text-align:center;padding:20px}
.detail-content{display:none;flex-direction:column;gap:14px;flex:1}
.detail-content.active{display:flex}

.detail-content .step-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:#002A5C;line-height:1.2}
.detail-content .step-num-badge{display:inline-block;background:#0077C8;color:#fff;width:28px;height:28px;border-radius:50%;font-size:.78rem;font-weight:700;text-align:center;line-height:28px;margin-bottom:4px}
.detail-content .desc{font-size:.85rem;color:#444;line-height:1.6}
.detail-content .meta-row{display:flex;gap:10px;flex-wrap:wrap}
.detail-content .meta-chip{background:#EFF6FF;border:1px solid rgba(0,119,200,.15);border-radius:8px;padding:6px 12px;font-size:.72rem;color:#002A5C;font-weight:500}
.detail-content .meta-chip .ml{font-size:.62rem;color:#6B7280;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:2px}

.detail-content .key-questions{background:#FEF3C7;border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:12px 14px}
.detail-content .key-questions h4{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:#92400E;margin-bottom:6px;font-weight:700}
.detail-content .key-questions ul{list-style:none;padding:0}
.detail-content .key-questions li{font-size:.78rem;color:#78350F;padding:3px 0;line-height:1.4}
.detail-content .key-questions li::before{content:"▸ ";color:#D97706}

.detail-content .outputs{background:#F0FDF4;border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:12px 14px}
.detail-content .outputs h4{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:#166534;margin-bottom:6px;font-weight:700}
.detail-content .outputs li{font-size:.78rem;color:#14532D;padding:2px 0;list-style:none}
.detail-content .outputs li::before{content:"✓ ";color:#22C55E}

.reset-btn{margin-top:auto;padding:8px 16px;background:#fff;border:1px solid #CBD5E1;border-radius:8px;color:#64748B;font-size:.75rem;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.reset-btn:hover{background:#EFF6FF;border-color:#0077C8;color:#0077C8}

/* SVG flow styles */
.flow-svg{width:100%;height:auto;display:block}
.node-rect{fill:#fff;stroke:#CBD5E1;stroke-width:2;rx:8;cursor:pointer;transition:all .15s}
.node-rect:hover{stroke:#0077C8;stroke-width:2.5;filter:drop-shadow(0 2px 6px rgba(0,119,200,.2))}
.node-rect.highlighted{stroke:#0077C8;stroke-width:3;fill:#EFF6FF;animation:pulseHighlight 2s ease infinite}
.node-decision{fill:#FEF3C7;stroke:#F59E0B;stroke-width:2;cursor:pointer;transition:all .15s}
.node-decision:hover{stroke:#D97706;stroke-width:2.5;filter:drop-shadow(0 2px 6px rgba(245,158,11,.25))}
.node-decision.highlighted{stroke:#D97706;stroke-width:3;fill:#FDE68A;animation:pulseHighlight 2s ease infinite}
.node-start{fill:#002A5C;stroke:none;rx:20;cursor:pointer}
.node-start:hover{filter:drop-shadow(0 2px 8px rgba(0,42,92,.4))}
.node-end{fill:#14532D;stroke:none;rx:20;cursor:pointer}
.node-end:hover{filter:drop-shadow(0 2px 8px rgba(20,83,45,.4))}
.node-label{font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;fill:#1E293B;pointer-events:none}
.node-label-white{font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;fill:#fff;pointer-events:none}
.node-sublabel{font-family:'Outfit',sans-serif;font-size:8.5px;fill:#6B7280;pointer-events:none}
.swim-label{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;fill:#002A5C;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.swim-label:hover{fill:#0077C8}
.arrow-line{stroke:#94A3B8;stroke-width:1.8;fill:none}
.arrow-yes{stroke:#22C55E;stroke-width:1.8;fill:none}
.arrow-no{stroke:#EF4444;stroke-width:1.8;fill:none}
.decision-label{font-family:'Space Mono',monospace;font-size:8px;font-weight:700}
.lane-divider{stroke:#E2E8F0;stroke-width:1;stroke-dasharray:6 4}
.step-num{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;fill:#0077C8}
.lane-bg-0{fill:rgba(0,119,200,.03)}
.lane-bg-1{fill:rgba(0,42,92,.02)}
.lane-bg-2{fill:rgba(0,119,200,.03)}

.footer-note{font-size:.62rem;color:#9CA3AF;text-align:center;margin-top:8px;animation:fadeIn .5s ease both;animation-delay:.5s}
</style>

<div class="root">
  <div class="hero">
    <h1>Service Technician Field Workflow</h1>
    <div class="sub">On-Site Pump Troubleshooting — Issue Assessment &amp; Decision Process</div>
    <div class="badge">◈ UX Research Session — Workflow Visualization</div>
  </div>

  <div class="main-layout">
    <div class="flow-area">
      <h2><span class="phase-dot"></span>Troubleshooting Workflow — Swim Lanes by Actor</h2>
      <svg class="flow-svg" viewBox="0 0 640 780" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="ah" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/></marker>
          <marker id="ahy" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#22C55E"/></marker>
          <marker id="ahn" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#EF4444"/></marker>
          <marker id="ahb" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#0077C8"/></marker>
        </defs>

        <!-- Swim lane backgrounds -->
        <rect x="80" y="0" width="560" height="260" class="lane-bg-0" rx="0"/>
        <rect x="80" y="260" width="560" height="260" class="lane-bg-1" rx="0"/>
        <rect x="80" y="520" width="560" height="260" class="lane-bg-2" rx="0"/>

        <!-- Swim lane labels -->
        <rect x="0" y="0" width="76" height="260" fill="#002A5C" rx="0"/>
        <text x="38" y="130" class="swim-label" data-lane="technician" style="fill:#fff" transform="rotate(-90,38,130)" text-anchor="middle">TECHNICIAN</text>
        <rect x="0" y="260" width="76" height="260" fill="#003D7A" rx="0"/>
        <text x="38" y="390" class="swim-label" data-lane="system" style="fill:#fff" transform="rotate(-90,38,390)" text-anchor="middle">DIGITAL TOOL</text>
        <rect x="0" y="520" width="76" height="260" fill="#002A5C" rx="0"/>
        <text x="38" y="650" class="swim-label" data-lane="collaborate" style="fill:#fff" transform="rotate(-90,38,650)" text-anchor="middle">COLLABORATION</text>

        <!-- Lane dividers -->
        <line x1="80" y1="260" x2="640" y2="260" class="lane-divider"/>
        <line x1="80" y1="520" x2="640" y2="520" class="lane-divider"/>

        <!-- ═══ STEP 1: START ═══ -->
        <rect data-step="start" x="120" y="20" width="140" height="36" class="node-start" rx="18"/>
        <text x="190" y="42" class="node-label-white" text-anchor="middle">Arrive on Site</text>
        <text x="100" y="42" class="step-num">①</text>

        <!-- Arrow down to Step 2 -->
        <line x1="190" y1="56" x2="190" y2="80" class="arrow-line" marker-end="url(#ah)"/>

        <!-- ═══ STEP 2: Understand Case ═══ -->
        <rect data-step="understand" x="110" y="82" width="160" height="48" class="node-rect" rx="8"/>
        <rect x="110" y="82" width="4" height="48" rx="2" fill="#0077C8"/>
        <text x="124" y="102" class="node-label">Review Customer Report</text>
        <text x="124" y="116" class="node-sublabel">Unstable operation reported</text>
        <text x="100" y="102" class="step-num">②</text>

        <!-- Arrow right to Step 3 (in Digital Tool lane) -->
        <line x1="270" y1="106" x2="270" y2="290" class="arrow-line" marker-end="url(#ah)"/>

        <!-- ═══ STEP 3: Locate Tech Info (Digital Tool lane) ═══ -->
        <rect data-step="locate-info" x="190" y="290" width="170" height="52" class="node-rect" rx="8"/>
        <rect x="190" y="290" width="4" height="52" rx="2" fill="#0077C8"/>
        <text x="204" y="312" class="node-label">Locate Technical Info</text>
        <text x="204" y="324" class="node-sublabel">Pump data, installation practice</text>
        <text x="178" y="312" class="step-num">③</text>

        <!-- Arrow right to Step 4 -->
        <line x1="360" y1="316" x2="400" y2="316" class="arrow-line" marker-end="url(#ah)"/>

        <!-- ═══ STEP 4: Distinguish Info Types (Digital Tool) ═══ -->
        <rect data-step="distinguish-info" x="402" y="290" width="170" height="52" class="node-rect" rx="8"/>
        <rect x="402" y="290" width="4" height="52" rx="2" fill="#7B3FA0"/>
        <text x="416" y="312" class="node-label">Distinguish Info Types</text>
        <text x="416" y="324" class="node-sublabel">Case info vs. product info</text>
        <text x="390" y="312" class="step-num">④</text>

        <!-- Arrow up to Step 5 (Technician lane) -->
        <line x1="487" y1="290" x2="487" y2="168" class="arrow-line" marker-end="url(#ah)"/>

        <!-- ═══ STEP 5: Assess Issue (Technician lane) ═══ -->
        <rect data-step="assess" x="400" y="82" width="170" height="52" class="node-rect" rx="8"/>
        <rect x="400" y="82" width="4" height="52" rx="2" fill="#C05B00"/>
        <text x="414" y="102" class="node-label">Assess the Issue</text>
        <text x="414" y="116" class="node-sublabel">Form hypothesis, identify root cause</text>
        <text x="388" y="102" class="step-num">⑤</text>

        <!-- Arrow down to Decision (Technician) -->
        <line x1="485" y1="134" x2="485" y2="162" class="arrow-line" marker-end="url(#ah)"/>

        <!-- ═══ DECISION 1: Confident in diagnosis? ═══ -->
        <polygon data-step="decision-confident" class="node-decision" points="485,165 565,200 485,235 405,200"/>
        <text x="485" y="196" class="node-label" text-anchor="middle" font-size="9.5">Confident in</text>
        <text x="485" y="208" class="node-label" text-anchor="middle" font-size="9.5">diagnosis?</text>

        <!-- YES arrow down to Step 6 -->
        <line x1="485" y1="235" x2="350" y2="390" class="arrow-yes" marker-end="url(#ahy)"/>
        <text x="395" y="310" class="decision-label" fill="#22C55E">Yes</text>

        <!-- NO arrow right, loops back to locate info -->
        <line x1="565" y1="200" x2="610" y2="200" class="arrow-no"/>
        <line x1="610" y1="200" x2="610" y2="370" class="arrow-no"/>
        <line x1="610" y1="370" x2="487" y2="370" class="arrow-no"/>
        <line x1="487" y1="370" x2="487" y2="345" class="arrow-no" marker-end="url(#ahn)"/>
        <text x="618" y="280" class="decision-label" fill="#EF4444" transform="rotate(90,618,280)">No — Gather more</text>

        <!-- ═══ STEP 6: Draw Conclusions (Digital Tool) ═══ -->
        <rect data-step="conclusions" x="260" y="385" width="180" height="52" class="node-rect" rx="8"/>
        <rect x="260" y="385" width="4" height="52" rx="2" fill="#0077C8"/>
        <text x="274" y="405" class="node-label">Draw Conclusions</text>
        <text x="274" y="419" class="node-sublabel">Document findings in tool</text>
        <text x="248" y="405" class="step-num">⑥</text>

        <!-- Arrow down to Decision 2 -->
        <line x1="350" y1="437" x2="350" y2="460" class="arrow-line" marker-end="url(#ah)"/>

        <!-- ═══ DECISION 2: Need collaboration? ═══ -->
        <polygon data-step="decision-collab" class="node-decision" points="350,462 430,497 350,532 270,497"/>
        <text x="350" y="493" class="node-label" text-anchor="middle" font-size="9.5">Need help /</text>
        <text x="350" y="505" class="node-label" text-anchor="middle" font-size="9.5">escalation?</text>

        <!-- YES arrow down to Collaboration lane -->
        <line x1="350" y1="532" x2="350" y2="562" class="arrow-yes" marker-end="url(#ahy)"/>
        <text x="358" y="550" class="decision-label" fill="#22C55E">Yes</text>

        <!-- NO arrow right to self-follow-up -->
        <line x1="430" y1="497" x2="490" y2="497" class="arrow-no"/>
        <line x1="490" y1="497" x2="490" y2="640" class="arrow-no"/>
        <line x1="490" y1="640" x2="460" y2="640" class="arrow-no" marker-end="url(#ahn)"/>
        <text x="498" y="565" class="decision-label" fill="#EF4444" transform="rotate(90,498,565)">No — Self follow-up</text>

        <!-- ═══ STEP 7: Collaborate / Escalate (Collaboration lane) ═══ -->
        <rect data-step="collaborate" x="245" y="565" width="210" height="52" class="node-rect" rx="8"/>
        <rect x="245" y="565" width="4" height="52" rx="2" fill="#BE1E2D"/>
        <text x="259" y="585" class="node-label">Contact Manager / Expert</text>
        <text x="259" y="599" class="node-sublabel">Escalate, request reinforcement</text>
        <text x="233" y="585" class="step-num">⑦</text>

        <!-- Arrow down to Decision 3 -->
        <line x1="350" y1="617" x2="350" y2="632" class="arrow-line" marker-end="url(#ah)"/>

        <!-- ═══ STEP 8: Decide Next Action (Collaboration lane) ═══ -->
        <rect data-step="decide-action" x="245" y="634" width="210" height="52" class="node-rect" rx="8"/>
        <rect x="245" y="634" width="4" height="52" rx="2" fill="#0077C8"/>
        <text x="259" y="654" class="node-label">Decide on Next Action</text>
        <text x="259" y="668" class="node-sublabel">Set checkpoints &amp; stages</text>
        <text x="233" y="654" class="step-num">⑧</text>

        <!-- Arrow down to Step 9 -->
        <line x1="350" y1="686" x2="350" y2="710" class="arrow-line" marker-end="url(#ah)"/>

        <!-- ═══ STEP 9: Document & Complete ═══ -->
        <rect data-step="document" x="280" y="712" width="140" height="36" class="node-end" rx="18"/>
        <text x="350" y="734" class="node-label-white" text-anchor="middle">Document &amp; Close</text>
        <text x="268" y="734" class="step-num" style="fill:#22C55E">⑨</text>

      </svg>
    </div>

    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <span>Step Details</span>
        <button class="reset-btn" id="resetBtn" style="margin:0;padding:4px 10px;font-size:.68rem">Reset</button>
      </div>
      <div class="detail-placeholder" id="detailPlaceholder">
        ← Click a step in the workflow<br>to see details
      </div>
      <div class="detail-content" id="detailContent"></div>
    </div>
  </div>

  <div class="footer-note">Generated by Meeting AI Visualizer</div>
</div>

<script>(function(){
var steps={
  "start":{num:"①",name:"Arrive on Site",actor:"Technician",status:"● Entry Point",statusColor:"#0077C8",
    desc:"Service technician arrives at customer location. Pump system (Grundfos CU 362) is not performing as expected. Customer reports unstable operation and wants quick clarification plus guidance on next steps.",
    questions:["What has the customer observed?","How long has the issue persisted?","Are there any environmental changes?"],
    outputs:["Initial situation awareness","Customer expectations noted","Safety check completed"]},
  "understand":{num:"②",name:"Review Customer Report",actor:"Technician",status:"● Active Phase",statusColor:"#0077C8",
    desc:"Review the initial overview of the reported issue. Check display readings on the CU 362 controller: flow 18.5 m³/h, pressure 4.2 bar (fluctuating). Note the active warning (ALM LED amber). Capture the customer's description of unstable operation.",
    questions:["What are the current display readings?","Is the ALM LED active?","What does the customer describe as 'unstable'?","When did the issue first appear?"],
    outputs:["Baseline readings captured","Warning state confirmed","Customer complaint documented"]},
  "locate-info":{num:"③",name:"Locate Technical Information",actor:"Digital Tool",status:"● Research Phase",statusColor:"#7B3FA0",
    desc:"Navigate the digital support tool (via MENU button) to find relevant pump technical data and installation practice documentation. Look up pump specifications, commissioning records, expected operating parameters, and maintenance history.",
    questions:["Where is the technical data located in the tool?","What pump specifications are available?","Can I find installation practice records?","Is the task too difficult to find information?","What information do I need to feel confident?"],
    outputs:["Pump specs retrieved","Installation data found","Operating parameters baseline established"]},
  "distinguish-info":{num:"④",name:"Distinguish Information Types",actor:"Digital Tool",status:"● Analysis Phase",statusColor:"#7B3FA0",
    desc:"Differentiate between case-specific information (current readings, customer report, alarm history) and product/private information (pump specs, design parameters, installation standards). Identify if anything is missing or if additional data sources are needed.",
    questions:["What is case information vs. product information?","Is anything missing from the available data?","Do I have enough to proceed confidently?","Are there privacy considerations?"],
    outputs:["Information categorized","Gaps identified","Confidence level assessed"]},
  "assess":{num:"⑤",name:"Assess the Issue",actor:"Technician",status:"● Critical Phase",statusColor:"#C05B00",
    desc:"Form a hypothesis about what might be causing the unstable operation. Cross-reference live readings with expected values. Check event history for recurring patterns. Evaluate whether pressure fluctuations indicate a system-level or pump-level issue. What system data leads to this conclusion?",
    questions:["What do we think the issue might be?","What system data leads to this conclusion?","Are pressure fluctuations from system or pump?","Do event logs show recurring patterns?"],
    outputs:["Hypothesis formed","Root cause narrowed","Evidence documented from readings"]},
  "decision-confident":{num:"◆",name:"Confident in Diagnosis?",actor:"Technician",status:"◆ Decision Point",statusColor:"#F59E0B",
    desc:"The technician must evaluate whether they have enough information and confidence in their diagnosis to proceed. If NOT confident, loop back to gather more technical information from the digital tool. If confident, proceed to draw conclusions.",
    questions:["Do I have enough evidence?","Am I confident in the root cause?","Should I gather more data first?","Is the task too difficult at this point?"],
    outputs:["YES → Proceed to conclusions","NO → Return to information gathering"]},
  "conclusions":{num:"⑥",name:"Draw Conclusions",actor:"Digital Tool",status:"● Documentation",statusColor:"#0077C8",
    desc:"Document findings and conclusions in the digital support tool. Record the identified issue, supporting evidence, and preliminary assessment. What do we do with these conclusions — do we need to interact with other employees or a manager?",
    questions:["What conclusions can be drawn?","Do we need to involve other employees?","Do we need manager approval?","What checkpoints should be set?"],
    outputs:["Findings documented","Conclusion recorded","Escalation need assessed"]},
  "decision-collab":{num:"◆",name:"Need Help / Escalation?",actor:"Technician → Team",status:"◆ Decision Point",statusColor:"#F59E0B",
    desc:"Decide whether the technician can follow up on this alone or needs reinforcement. Does the technician have all the capabilities needed? Does someone with more expertise in this topic need to be involved? Are there stages/checkpoints that require manager sign-off?",
    questions:["Can I follow up on this myself?","Do I have the required capabilities?","Do I need someone with more expertise?","Does this require manager involvement?","What checkpoints need to be completed?"],
    outputs:["YES → Contact manager/expert","NO → Self follow-up path"]},
  "collaborate":{num:"⑦",name:"Contact Manager / Expert",actor:"Collaboration",status:"● Escalation",statusColor:"#BE1E2D",
    desc:"Reach out to manager or subject-matter expert for reinforcement. Share findings from the digital tool. Discuss whether additional on-site expertise is needed or if remote guidance is sufficient. Set up different checkpoints and stages for task completion.",
    questions:["Who has the right expertise?","Is remote guidance sufficient?","What checkpoints need to be established?","What stages are required for completion?"],
    outputs:["Expert consulted","Guidance received","Checkpoints defined","Stages mapped out"]},
  "decide-action":{num:"⑧",name:"Decide on Next Action",actor:"Collaboration",status:"● Planning",statusColor:"#0077C8",
    desc:"Based on conclusions and any expert input, determine the concrete next action. Will the technician follow up personally? What specific follow-up is needed? Set clear checkpoints and completion criteria. Define what capabilities are required for resolution.",
    questions:["What is the follow-up action?","What does the technician need to complete it?","Are all required capabilities available?","What are the completion criteria?"],
    outputs:["Next action defined","Responsibilities assigned","Timeline established","Checkpoints set"]},
  "document":{num:"⑨",name:"Document & Close Visit",actor:"Technician",status:"● Complete",statusColor:"#14532D",
    desc:"Complete the visit with proper documentation in the digital support tool. Record all findings, actions taken, recommended next steps, escalation details if any, and scheduled follow-up. Provide the customer with clear guidance on what happens next.",
    questions:["Are all findings recorded?","Is the customer informed of next steps?","Is follow-up scheduled?"],
    outputs:["Visit documented","Customer briefed","Follow-up scheduled","Case updated in system"]}
};

function showDetail(id){
  var s=steps[id];if(!s)return;
  document.getElementById('detailPlaceholder').style.display='none';
