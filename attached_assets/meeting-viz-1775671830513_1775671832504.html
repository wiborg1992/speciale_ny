<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comfort GO — Physical Panel</title>
<style>
  @keyframes ledAlarm { 0%,100%{opacity:1} 50%{opacity:.25} }
  @keyframes fadeIn   { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  @keyframes spin     { to{transform:rotate(360deg)} }
  @keyframes ledPulse { 0%,100%{opacity:1;filter:drop-shadow(0 0 6px #22C55E)} 50%{opacity:.7;filter:drop-shadow(0 0 12px #22C55E)} }
  @keyframes screenGlow { 0%,100%{opacity:1} 50%{opacity:.92} }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #F8FAFC;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 32px 24px 40px;
  }

  .page-title {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #4B5563;
    margin-bottom: 6px;
    animation: fadeIn 0.5s ease both;
  }

  .page-sub {
    font-size: 0.72rem;
    color: #9CA3AF;
    letter-spacing: 0.08em;
    margin-bottom: 36px;
    animation: fadeIn 0.5s ease 0.1s both;
  }

  .svg-wrap {
    width: 100%;
    max-width: 820px;
    animation: fadeUp 0.6s ease 0.15s both;
  }

  .chips-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeIn 0.5s ease 0.4s both;
  }

  .chip {
    background: #F1F5F9;
    border: 1px solid #E2E8F0;
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 0.72rem;
    font-weight: 600;
    color: #374151;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .chip.green {
    background: #F0FDF4;
    border-color: #86EFAC;
    color: #166534;
  }

  .chip.blue {
    background: #EFF6FF;
    border-color: #93C5FD;
    color: #1D4ED8;
  }

  .footer {
    margin-top: 36px;
    font-size: 0.62rem;
    color: #CBD5E1;
    letter-spacing: 0.08em;
    animation: fadeIn 0.5s ease 0.55s both;
  }
</style>
</head>
