openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Meeting AI Visualizer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: visualize
    description: AI visualization generation
  - name: rooms
    description: Multi-user room management
  - name: deepgram
    description: Deepgram STT token
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /visualize:
    post:
      operationId: visualize
      tags: [visualize]
      summary: Generate AI visualization from transcript
      description: Streams HTML visualization from Claude as SSE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisualizeRequest"
      responses:
        "200":
          description: SSE stream of visualization chunks
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deepgram-token:
    get:
      operationId: getDeepgramToken
      tags: [deepgram]
      summary: Get Deepgram API token for browser
      description: Returns a token for Deepgram WebSocket STT in the browser
      responses:
        "200":
          description: Token response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeepgramTokenResponse"
        "403":
          description: Deepgram token delivery disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /segment:
    post:
      operationId: postSegment
      tags: [rooms]
      summary: Post transcript segment to room
      description: Sends a transcript segment to the room, which is broadcast to all participants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentRequest"
      responses:
        "200":
          description: Segment accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /history:
    get:
      operationId: getHistory
      tags: [rooms]
      summary: Get meeting history
      description: Returns list of saved meetings
      responses:
        "200":
          description: Meeting history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    VisualizeRequest:
      type: object
      properties:
        transcript:
          type: string
          description: The full normalized transcript text to visualize
        previousHtml:
          type: ["string", "null"]
          description: Previous visualization HTML for incremental updates
        roomId:
          type: ["string", "null"]
          description: Room ID to broadcast the visualization to
        speakerName:
          type: ["string", "null"]
          description: Name of the participant triggering visualization
        workspaceDomain:
          type: ["string", "null"]
          description: >
            Workspace corpus — grundfos (industrial pumps default), gabriel (furniture/textiles),
            or generic/neutral/other. Omitted or null defaults to grundfos on the server.
      required:
        - transcript

    DeepgramTokenResponse:
      type: object
      properties:
        key:
          type: string
          description: Deepgram API key or short-lived token
      required:
        - key

    SegmentRequest:
      type: object
      properties:
        roomId:
          type: string
          description: The room to post to
        speakerName:
          type: string
          description: Name of the speaker
        text:
          type: string
          description: The transcribed text segment
        timestamp:
          type: number
          description: Unix timestamp (ms) of the segment
        isFinal:
          type: boolean
          description: Whether the segment is final (not interim)
      required:
        - roomId
        - speakerName
        - text
        - timestamp
        - isFinal

    SegmentResponse:
      type: object
      properties:
        ok:
          type: boolean
        segmentId:
          type: string
      required:
        - ok
        - segmentId

    MeetingRecord:
      type: object
      properties:
        id:
          type: string
        roomId:
          type: string
        createdAt:
          type: number
        segments:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptSegment"
        lastVisualization:
          type: ["string", "null"]
      required:
        - id
        - roomId
        - createdAt
        - segments

    TranscriptSegment:
      type: object
      properties:
        id:
          type: string
        speakerName:
          type: string
        text:
          type: string
        timestamp:
          type: number
        isFinal:
          type: boolean
      required:
        - id
        - speakerName
        - text
        - timestamp
        - isFinal

    HistoryResponse:
      type: object
      properties:
        meetings:
          type: array
          items:
            $ref: "#/components/schemas/MeetingRecord"
      required:
        - meetings
